server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:.env[.properties]
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/users/**,/api/users/**,/api/public/**
          filters:
            - StripPrefix=0

        - id: client-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/admin/clients/**
          filters:
            - StripPrefix=0

        - id: intervention-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/admin/interventions/**,/api/technician/interventions/**
          filters:
            - StripPrefix=0

        - id: media-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/media/**
          filters:
            - StripPrefix=0
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/ng-fields}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /api/admin/users/v3/api-docs
      - name: client-service
        url: /api/admin/clients/v3/api-docs
      - name: intervention-service
        url: /api/admin/interventions/v3/api-docs
      - name: media-service
        url: /api/media/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
