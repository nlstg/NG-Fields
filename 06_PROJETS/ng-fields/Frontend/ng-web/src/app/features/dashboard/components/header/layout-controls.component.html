<div class="relative inline-block">
  <button (click)="toggle()" class="inline-flex items-center justify-center rounded-md p-2 text-muted-foreground hover:bg-accent hover:text-foreground" title="Layout controls">
    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
  </button>
  @if (isOpen()) {
    <div class="absolute right-0 top-full z-50 mt-1 min-w-[200px] rounded-lg border bg-popover p-2 shadow-md" (click)="close()">
      <div class="space-y-4 p-2">
        <div class="space-y-2">
          <div class="text-xs font-medium text-muted-foreground uppercase tracking-wider">Theme Preset</div>
          <div class="flex flex-wrap gap-1">
            @for (preset of presets; track preset) {
              <button (click)="setPreset(preset)" class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors" [class.bg-primary]="currentPreset === preset" [class.text-primary-foreground]="currentPreset === preset" [class.bg-accent]="currentPreset !== preset" [class.text-foreground]="currentPreset !== preset">
                {{ preset }}
              </button>
            }
          </div>
        </div>
        <div class="space-y-2">
          <div class="text-xs font-medium text-muted-foreground uppercase tracking-wider">Theme Mode</div>
          <div class="flex gap-1">
            @for (mode of modes; track mode.value) {
              <button (click)="setMode(mode.value)" class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors" [class.bg-primary]="currentMode === mode.value" [class.text-primary-foreground]="currentMode === mode.value" [class.bg-accent]="currentMode !== mode.value" [class.text-foreground]="currentMode !== mode.value">
                {{ mode.label }}
              </button>
            }
          </div>
        </div>
        <div class="space-y-2">
          <div class="text-xs font-medium text-muted-foreground uppercase tracking-wider">Font</div>
          <div class="flex flex-wrap gap-1">
            @for (font of fonts; track font.value) {
              <button (click)="setFont(font.value)" class="rounded-md px-2.5 py-1 text-xs font-medium bg-accent text-foreground transition-colors hover:bg-primary hover:text-primary-foreground">
                {{ font.label }}
              </button>
            }
          </div>
        </div>
      </div>
    </div>
  }
</div>
