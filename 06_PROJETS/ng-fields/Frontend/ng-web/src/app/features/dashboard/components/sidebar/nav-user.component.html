<div class="relative inline-block w-full">
  <div (click)="toggle()" class="flex items-center gap-2 px-2 py-1.5 cursor-pointer rounded-md hover:bg-sidebar-accent">
    <div class="size-8 rounded-lg bg-sidebar-primary text-sidebar-primary-foreground flex items-center justify-center text-sm font-medium">
      {{ user.name.split(' ').map(w => w[0]).join('').slice(0, 2) }}
    </div>
    <div class="grid text-left text-sm leading-tight">
      <span class="truncate font-semibold">{{ user.name }}</span>
      <span class="truncate text-xs text-sidebar-foreground/70">{{ user.email }}</span>
    </div>
  </div>
  @if (isOpen()) {
    <div class="absolute left-0 top-full z-50 mt-1 min-w-[200px] rounded-lg border bg-popover p-1 shadow-md" (click)="close()">
      @for (item of menuItems; track item.id) {
        @if (item.separator) {
          <div class="my-1 border-t"></div>
        } @else if (item.url) {
          <a [routerLink]="item.url" (click)="close()" class="flex items-center gap-2 rounded-md px-2 py-1.5 text-sm hover:bg-accent cursor-pointer">
            {{ item.label }}
          </a>
        } @else {
          <div (click)="item.onClick?.(); close()" class="flex items-center gap-2 rounded-md px-2 py-1.5 text-sm hover:bg-accent cursor-pointer">
            {{ item.label }}
          </div>
        }
      }
    </div>
  }
</div>
