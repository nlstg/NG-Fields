<div class="space-y-4 p-4 md:p-6">
  <div class="flex items-center gap-2 text-sm text-muted-foreground">
    <a [routerLink]="['/dashboard']" class="hover:text-foreground">Tableau de bord</a>
    <span>/</span>
    <a [routerLink]="['/dashboard/clients']" class="hover:text-foreground">Clients</a>
    <span>/</span>
    @if (client(); as c) {
      <span class="text-foreground">{{ c.name }}</span>
    }
  </div>

  @if (isLoading()) {
    <div class="space-y-4">
      <div class="h-12 rounded-lg bg-muted animate-pulse"></div>
      <div class="grid gap-4 md:grid-cols-3">
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
      </div>
    </div>
  }

  @if (error(); as err) {
    <div class="rounded-lg border border-red-200 bg-red-50 dark:bg-red-950 p-4 text-red-700 dark:text-red-400">
      {{ err }}
    </div>
  }

  @if (client(); as client) {
    <div class="space-y-6">
      <app-client-header [client]="client" (onStatusChange)="onStatusChange($event)" />

      <div class="grid gap-6 lg:grid-cols-3">
        <div class="lg:col-span-2 space-y-6">
          <app-client-info [client]="client" />
          <app-client-interventions-upcoming [interventions]="client.interventionsUpcoming" />
          <app-client-interventions-history [interventions]="client.interventionsHistory" />
        </div>

        <div class="space-y-6">
          <app-client-contacts [contacts]="client.allContacts" />
          <app-client-notes [notes]="client.notes" (onNotesUpdate)="onNotesUpdate($event)" />
          <app-client-actions [client]="client" (onStatusChange)="onStatusChange($event)" />
        </div>
      </div>
    </div>
  }
</div>
