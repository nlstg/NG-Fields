<div class="space-y-4 p-4 md:p-6">
  <div class="flex items-center gap-2 text-sm text-muted-foreground">
    <a [routerLink]="['/dashboard']" class="hover:text-foreground">Tableau de bord</a>
    <span>/</span>
    <a [routerLink]="['/dashboard/interventions']" class="hover:text-foreground">Interventions</a>
    <span>/</span>
    @if (intervention(); as inter) {
      <span class="text-foreground">{{ inter.reference }}</span>
    }
  </div>

  @if (isLoading()) {
    <div class="space-y-4">
      <div class="h-12 rounded-lg bg-muted animate-pulse"></div>
      <div class="grid gap-4 md:grid-cols-3">
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
        <div class="h-64 rounded-lg bg-muted animate-pulse"></div>
      </div>
    </div>
  }

  @if (error(); as err) {
    <div class="rounded-lg border border-red-200 bg-red-50 dark:bg-red-950 p-4 text-red-700 dark:text-red-400">
      {{ err }}
    </div>
  }

  @if (intervention(); as inter) {
    <div class="space-y-6">
      <app-intervention-header [intervention]="inter" />

      <div class="grid gap-6 lg:grid-cols-3">
        <div class="lg:col-span-2 space-y-6">
          <app-intervention-details [intervention]="inter" />
          <app-intervention-files [attachments]="inter.attachments" />
          <app-intervention-notes [notes]="inter.notes" (onNoteAdded)="onNoteAdded($event)" />
        </div>

        <div class="space-y-6">
          <app-intervention-timeline [entries]="inter.timeline" />
          <app-intervention-actions
            [intervention]="inter"
            (onAssign)="onAssign($event)"
            (onStatusChange)="onStatusChange($event)"
          />
        </div>
      </div>
    </div>
  }
</div>
