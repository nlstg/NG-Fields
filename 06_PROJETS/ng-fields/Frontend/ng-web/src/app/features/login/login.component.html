<div class="flex h-dvh">
  <div class="hidden bg-primary lg:block lg:w-1/3">
    <div class="flex h-full flex-col items-center justify-center p-12 text-center">
      <div class="space-y-6">
        <svg class="mx-auto size-12 text-primary-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>
        <div class="space-y-2">
          <h1 class="font-light text-5xl text-primary-foreground">Hello again</h1>
          <p class="text-primary-foreground/80 text-xl">Login to continue</p>
        </div>
      </div>
    </div>
  </div>
  <div class="flex w-full items-center justify-center bg-background p-8 lg:w-2/3">
    <div class="w-full max-w-md space-y-10 py-24 lg:py-32">
      <div class="space-y-4 text-center">
        <div class="font-medium tracking-tight">Login</div>
        <div class="mx-auto max-w-xl text-muted-foreground">
          Welcome back. Click the button below to sign in with your Keycloak account.
        </div>
      </div>
      <div class="space-y-4">
        <button (click)="loginWithKeycloak()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Se connecter avec Keycloak
        </button>
        <p class="text-center text-muted-foreground text-xs">
          Don&apos;t have an account?
          <a routerLink="/register" class="text-primary">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
