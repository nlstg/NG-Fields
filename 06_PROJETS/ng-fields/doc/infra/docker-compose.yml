services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ngfields
      POSTGRES_USER: ngfields
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ngfields-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngfields"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ngfields
      KC_DB_USERNAME: ngfields
      KC_DB_PASSWORD: ${DB_PASSWORD:-ngfields-dev}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin123}
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ../apps/ng-fields-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ngfields
      SPRING_DATASOURCE_USERNAME: ngfields
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ngfields-dev}
      SPRING_REDIS_HOST: redis
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ng-fields
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  pgdata:
